name: Python build and release

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag'
        required: true
        default: 'v0.0.0'

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}

    if: ${{ !contains(github.event.head_commit.message, 'dev') }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: PalworldServerConfigParser-linux-amd64
          - os: windows-latest
            artifact_name: PalworldServerConfigParser-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name PalworldServerConfigParser src/main.py

      - name: Verify build output (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ ! -f "dist/PalworldServerConfigParser" ]; then
            echo "Build output is missing!"
            exit 1
          fi
          chmod 755 dist/PalworldServerConfigParser
          echo "Build completed successfully."

      - name: Verify build output (Windows)
        if: runner.os == 'Windows'
        run: |
          if (!(Test-Path "dist\PalworldServerConfigParser.exe")) {
            Write-Error "Build output is missing!"
            exit 1
          }
          Write-Output "Build completed successfully."

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mv dist/PalworldServerConfigParser "dist/${{ matrix.artifact_name }}"

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item "dist\PalworldServerConfigParser.exe" "dist\${{ matrix.artifact_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 5

  generate-checksum:
    permissions: write-all
    name: Generate checksum file
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: "PalworldServerConfigParser-linux-amd64"
          path: "dist"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: "PalworldServerConfigParser-windows-amd64.exe"
          path: "dist"

      - name: Generate checksum.txt
        run: |
          cd dist
          sha256sum * > checksum.txt
          cd ..

      - name: Upload release artifacts
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          tag: ${{ github.ref_name || inputs.tag_name }}
          overwrite: false
          file_glob: true